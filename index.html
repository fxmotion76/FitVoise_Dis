function versioned(src){return src.includes('?')?src:`${src}?${assetVersion}`}
function loadImage(src,onload=redrawCreateChars){const img=new Image();img.src=versioned(src);img.onload=onload;return img}
function isOrange(r,g,b,a){if(a<40)return false;const max=Math.max(r,g,b),min=Math.min(r,g,b);return r>165&&g>55&&g<185&&b<115&&r>g+18&&g>b+8&&(max-min)>58}
function shade(target,r,g,b){const lum=.2126*r+.7152*g+.0722*b;const f=Math.max(.52,Math.min(1.30,lum/145));return [Math.max(0,Math.min(255,Math.round(target[0]*f))),Math.max(0,Math.min(255,Math.round(target[1]*f))),Math.max(0,Math.min(255,Math.round(target[2]*f)))]}
function drawTinted(canvas,img,w=569,h=569){
  if(!canvas||!img.complete||!img.naturalWidth)return null;
  try{
    const ctx=canvas.getContext('2d',{willReadFrequently:true});
    canvas.width=w;canvas.height=h;ctx.clearRect(0,0,w,h);ctx.drawImage(img,0,0,w,h);
    const data=ctx.getImageData(0,0,w,h),p=data.data,target=colors[state.color]||colors.orange;
    for(let i=0;i<p.length;i+=4){if(isOrange(p[i],p[i+1],p[i+2],p[i+3])){const s=shade(target,p[i],p[i+1],p[i+2]);p[i]=s[0];p[i+1]=s[1];p[i+2]=s[2]}}
    ctx.putImageData(data,0,0);
    return true;
  }catch(e){
    canvasTintAvailable=false;
    canvas.classList.add('hidden');
    return false;
  }
}

function drawProfileChar(){

  canvas.style.left=item.x+'%';canvas.style.top=item.y+'%';canvas.style.width=item.w+'%';canvas.style.height=item.h+'%';
  return drawTinted(canvas,profileCharImages[item.src],item.px,item.py);
}
function drawProfileCat(){

function loadScreenAssets(name){
  const screen=document.getElementById(`screen-${name}`);
  if(!screen||screen.dataset.assetsLoaded==='1')return;
  screen.querySelectorAll('img[data-src]').forEach(img=>{
    img.src=versioned(img.dataset.src);
    img.removeAttribute('data-src');
  });
  screen.dataset.assetsLoaded='1';
}
function warmNextScreens(){
  const warm=()=>{loadScreenAssets('create');setTimeout(()=>loadScreenAssets('profile'),900)};
  if('requestIdleCallback' in window)requestIdleCallback(warm,{timeout:1600});
  else setTimeout(warm,800);
}
function show(name){
  loadScreenAssets(name);
  Object.entries(screens).forEach(([k,el])=>el.classList.toggle('active',k===name));
  requestAnimationFrame(fit);
}
function save(){localStorage.setItem('fv_lang',state.lang);localStorage.setItem('fv_hide',String(state.hide));localStorage.setItem('fv_character',state.character);localStorage.setItem('fv_color',state.color);localStorage.setItem('fv_name',state.name);localStorage.setItem('fv_stage',String(state.stage));localStorage.setItem('fv_xp',String(state.xp));localStorage.setItem('fv_day_done',String(state.dayDone));localStorage.setItem('fv_streak',String(state.streak));localStorage.setItem('fv_freezes',String(state.freezes))}
function clampProgress(){
  state.stage=Math.max(1,Math.min(progression.maxStage,Number(state.stage)||1));
  state.xp=Math.max(0,Math.min(progression.xpPerLevel-1,Number(state.xp)||0));
}
function addExercise(count=1){
  if(!state.dayDone){
    state.dayDone=true;
    state.streak=Math.max(0,Number(state.streak)||0)+1;
  }
  state.xp+=progression.xpPerExercise*count;
  while(state.xp>=progression.xpPerLevel&&state.stage<progression.maxStage){
    state.xp-=progression.xpPerLevel;
    state.stage+=1;
  }
  if(state.stage>=progression.maxStage)state.xp=Math.min(state.xp,progression.xpPerLevel-1);
  save();sync();
}
function addLevel(){
  state.stage=Math.min(progression.maxStage,state.stage+1);
  state.xp=0;
  save();sync();
}
function resetProgress(){
  state.stage=1;state.xp=0;state.dayDone=false;state.streak=0;state.freezes=5;
  save();sync();
}
function nextDay(){
  state.dayDone=false;
  save();sync();
}
function useFreeze(){
  if(state.dayDone||state.freezes<=0)return;
  state.freezes=Math.max(0,(Number(state.freezes)||0)-1);
  state.dayDone=true;
  state.streak=Math.max(0,Number(state.streak)||0)+1;
  save();sync();
}
function renderProgress(){
  clampProgress();
  const wrap=document.getElementById('progressSegments');
  if(!wrap)return;
  const count=Math.floor(state.xp/progression.xpPerExercise);
  const total=progression.xpPerLevel/progression.xpPerExercise;
  wrap.innerHTML='';
  for(let i=0;i<count;i++){
    const img=document.createElement('img');
    img.src=versioned(i%2?'assets/PersLevel/Skala_2.png':'assets/PersLevel/Skala_1.png');
    img.style.left=(i*(100/total))+'%';
    wrap.appendChild(img);
  }
  document.getElementById('xpText').textContent=`${state.xp}/${progression.xpPerLevel}`;
  document.getElementById('debugState').textContent=`L${state.stage} ${state.xp}/${progression.xpPerLevel} D${state.dayDone?1:0} S${state.streak} F${state.freezes}`;
}
function byId(id){return document.querySelector(`.layer[data-id="${id}"]`)}
function setId(id,visible){const el=byId(id);if(el)el.classList.toggle('hidden',!visible)}
function setIds(list,visible){list.forEach(id=>setId(id,visible))}
function pxBox(el){return el?el.getBoundingClientRect():null}
function stageBox(el){return el?.closest('.stage')?.getBoundingClientRect()||document.querySelector('.screen.active .stage')?.getBoundingClientRect()}
function placePx(el,left,top){
  if(!el)return;
  el.style.left=left+'px';
  el.style.top=top+'px';
}
function measureText(el){
  if(!el)return null;
  el.style.width='max-content';
  el.style.height='auto';
  return pxBox(el);
}
function centerIconTextBlock({frameId,iconId,textId,gap=8,textDy=0,iconDy=0}){
  const frameEl=byId(frameId), iconEl=byId(iconId), textEl=document.getElementById(textId);
  if(!frameEl||!iconEl||!textEl||textEl.classList.contains('hidden'))return;
  const stage=stageBox(frameEl), frame=pxBox(frameEl), icon=pxBox(iconEl), text=measureText(textEl);
  if(!stage||!frame||!icon||!text)return;
  const groupWidth=icon.width+gap+text.width;
  const groupLeft=frame.left+(frame.width-groupWidth)/2;
  const centerY=frame.top+frame.height/2;
  placePx(iconEl,groupLeft-stage.left,centerY-icon.height/2-stage.top+iconDy);
  placePx(textEl,groupLeft+icon.width+gap-stage.left,centerY-text.height/2-stage.top+textDy);
}
function centerCheckboxTextBlock(){
  const checkEl=byId(state.hide?ids.language.checkboxOn:ids.language.checkboxOff);
  const offEl=byId(ids.language.checkboxOff), onEl=byId(ids.language.checkboxOn), textEl=document.getElementById('hideText');
  const screenStage=document.querySelector('#screen-language .stage')?.getBoundingClientRect();
  if(!checkEl||!offEl||!onEl||!textEl||!screenStage)return;
  const check=pxBox(checkEl), text=measureText(textEl);
  if(!check||!text)return;
  const gap=state.lang==='en'?5:7;
  const groupWidth=check.width+gap+text.width;
  const groupLeft=screenStage.left+(screenStage.width-groupWidth)/2;
  const centerY=screenStage.top+screenStage.height*0.8005;
  const checkTop=centerY-check.height/2;
  const textTop=centerY-text.height/2+1;
  [offEl,onEl].forEach(el=>placePx(el,groupLeft-screenStage.left,checkTop-screenStage.top));
  placePx(textEl,groupLeft+check.width+gap-screenStage.left,textTop-screenStage.top);
}
function centerCardCounter(cardId,countId){
  const card=byId(cardId), el=document.getElementById(countId);
  const stage=stageBox(card), box=pxBox(card);
  if(!card||!el||!stage||!box)return;
  const w=box.width*.42, h=box.height*.23;
  el.style.width=w+'px';
  el.style.height=h+'px';
  placePx(el,box.left+box.width/2-w/2-stage.left,box.top+box.height*.50-stage.top);
}
function centerDayStatus(){
  const card=byId('6:86'), el=document.getElementById('dayDoneText');
  const stage=stageBox(card), box=pxBox(card);
  if(!card||!el||!stage||!box)return;
  const w=box.width*.86, h=box.height*.25;
  el.style.width=w+'px';
  el.style.height=h+'px';
  placePx(el,box.left+box.width/2-w/2-stage.left,box.top+box.height*.64-stage.top);
}

function syncCenteredBlocks(){

function setClock(mode){
  setId(ids.language.clockNormal,mode==='normal');
  setId(ids.language.clockBlink,mode==='blink');
  setId(ids.language.clockPress,mode==='press');
}
function blinkClock(){
  if(!screens.language.classList.contains('active'))return;
  setClock('blink');
  clearTimeout(blinkClock.off);
  blinkClock.off=setTimeout(()=>setClock('normal'),160);
}
function startClockBlink(){
  clearTimeout(startClockBlink.t);
  startClockBlink.t=setTimeout(()=>{blinkClock();startClockBlink()},2800+Math.random()*2500);
}
function pressClock(){
  clearTimeout(blinkClock.off);
  clearTimeout(pressClock.t);
  setClock('press');
  const el=byId(ids.language.clockPress);
  el?.classList.remove('clockTilt');
  void el?.offsetWidth;
  el?.classList.add('clockTilt');
  pressClock.t=setTimeout(()=>{el?.classList.remove('clockTilt');setClock('normal')},260);
}
function pulse({press,normal,text,speed=[]},dur=140){
  if(normal)setId(normal,false);
  if(press)setId(press,true);
  if(text)byId(text)?.classList.add('nudge');
  if(text && typeof text==='string' && text.startsWith('#'))document.querySelector(text)?.classList.add('nudge');
  setIds(speed,true);
  clearTimeout(pulse.t);
  pulse.t=setTimeout(()=>{
    if(press)setId(press,false);
    if(normal)setId(normal,true);
    if(text)byId(text)?.classList.remove('nudge');
    if(text && typeof text==='string' && text.startsWith('#'))document.querySelector(text)?.classList.remove('nudge');
    setIds(speed,false);
  },dur);
}
function pulseFreeze(){
  const targets=[byId('6:87'),byId('7:99'),document.getElementById('freezeCountText'),document.getElementById('freezeLabelText')].filter(Boolean);
  targets.forEach(el=>{el.classList.remove('freezePress');void el.offsetWidth;el.classList.add('freezePress')});
  clearTimeout(pulseFreeze.t);
  pulseFreeze.t=setTimeout(()=>targets.forEach(el=>el.classList.remove('freezePress')),190);
}
