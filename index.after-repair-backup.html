*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#121212}
body{font-family:"Balsamiq Sans","Comic Sans MS","Trebuchet MS",Arial,sans-serif}
button,input{font:inherit}

img{display:block}

#app{position:fixed;inset:0;overflow:hidden;background:#121212}
.screen{position:absolute;inset:0;opacity:0;pointer-events:none;transition:opacity .18s ease}
.screen.active{opacity:1;pointer-events:auto}
.fit{position:absolute;left:50%;top:50%;width:1080px;height:1920px;transform-origin:center center;overflow:hidden}
.stage{position:absolute;inset:0;width:1080px;height:1920px;overflow:hidden;background:#f3eadc}
.node{position:absolute;display:block;user-select:none}
.node img{width:100%;height:100%;object-fit:fill}
.node canvas{width:100%;height:100%;display:block}
.text{position:absolute;margin:0;color:#17120d;white-space:pre-wrap;display:flex;align-items:flex-start;justify-content:flex-start;letter-spacing:0;text-align:left}
.center{text-align:center;justify-content:center}
.pt{font-family:"PT Sans Narrow","Arial Narrow",Arial,sans-serif;font-weight:700}
.balsamiq{font-family:"Balsamiq Sans","Comic Sans MS","Trebuchet MS",Arial,sans-serif}
.white-stroke{color:#fff;text-shadow:-2px -2px 0 #17120d,2px -2px 0 #17120d,-2px 2px 0 #17120d,2px 2px 0 #17120d}
.orange{color:#e48a23}
.control{position:absolute;z-index:200;background:rgba(255,255,255,0);border:0}
.hidden{display:none!important}
.fit-input{position:absolute;z-index:210;border:0;outline:0;background:transparent;color:#17120d;font-family:"Balsamiq Sans","Comic Sans MS","Trebuchet MS",Arial,sans-serif;font-size:48px;line-height:58px;font-weight:400}

        <button class="control" id="backBtn" style="left:43px;top:38px;width:127px;height:114px" aria-label="Назад"></button>
      </main>
    </div>
  </section>
</div>

<script>
const screens={
  start:document.getElementById('startScreen'),
  create:document.getElementById('createScreen'),
  profile:document.getElementById('profileScreen')
};
const state={lang:localStorage.getItem('fv_lang')||'ru',hide:localStorage.getItem('fv_hide')!=='false',character:localStorage.getItem('fv_character')||'boy',color:localStorage.getItem('fv_color')||'orange',name:localStorage.getItem('fv_name')||''};
const COLORS={
  blue:[36,151,216],
  green:[106,201,67],
  orange:[242,140,24],
  red:[231,76,60],
  yellow:[241,196,15],
  purple:[142,68,173]
};
const recolorNodes=[];

function fit(){
  const scale=Math.min(window.innerWidth/1080, window.innerHeight/1920);
  document.querySelectorAll('.fit').forEach(el=>el.style.transform=`translate(-50%,-50%) scale(${scale})`);
}
function show(name){
  Object.entries(screens).forEach(([key,screen])=>screen.classList.toggle('active',key===name));
}
function isOrange(r,g,b,a){
  return a>35 && r>160 && g>45 && g<190 && b<125 && r>g+15 && g>b+4;
}
function shaded(target,r,g,b){
  const lum=.2126*r+.7152*g+.0722*b;
  const f=Math.max(.5,Math.min(1.35,lum/145));
  return target.map(v=>Math.max(0,Math.min(255,Math.round(v*f))));
}
function setupRecolorNode(el){
  const img=el.querySelector('img');
  if(!img)return;
  const canvas=document.createElement('canvas');
  const source=new Image();
  const width=parseInt(el.style.width,10);
  const height=parseInt(el.style.height,10);
  canvas.width=width;
  canvas.height=height;
  img.style.display='none';
  el.appendChild(canvas);
  const item={el,img:source,canvas,width,height,ready:false};
  source.onload=()=>{item.ready=true;drawRecolorNode(item)};
  source.src=img.getAttribute('src');
  recolorNodes.push(item);
}
function drawRecolorNode(item){
  if(!item.ready)return;
  const ctx=item.canvas.getContext('2d',{willReadFrequently:true});
  ctx.clearRect(0,0,item.width,item.height);
  ctx.drawImage(item.img,0,0,item.width,item.height);
  const data=ctx.getImageData(0,0,item.width,item.height);
  const pixels=data.data;
  const target=COLORS[state.color]||COLORS.orange;
  for(let i=0;i<pixels.length;i+=4){
    if(isOrange(pixels[i],pixels[i+1],pixels[i+2],pixels[i+3])){
      const rgb=shaded(target,pixels[i],pixels[i+1],pixels[i+2]);
      pixels[i]=rgb[0]; pixels[i+1]=rgb[1]; pixels[i+2]=rgb[2];
    }
  }
  ctx.putImageData(data,0,0);
}
function redrawCharacters(){
  recolorNodes.forEach(drawRecolorNode);
}
function pressPair(normalId,pressId){
  const normal=document.getElementById(normalId);
  const press=document.getElementById(pressId);
  if(!normal || !press)return;
  normal.classList.add('hidden');
  press.classList.remove('hidden');
  clearTimeout(press._timer);
  press._timer=setTimeout(()=>{
    press.classList.add('hidden');
    normal.classList.remove('hidden');
  },140);
}
function sync(){
  document.getElementById('checkboxOn').classList.toggle('hidden',!state.hide);
  document.getElementById('checkboxOff').classList.toggle('hidden',state.hide);
  document.getElementById('sloganEn').classList.toggle('hidden',state.lang!=='en');
  document.getElementById('sloganRu').classList.toggle('hidden',state.lang!=='ru');
  document.getElementById('boyNormal').classList.toggle('hidden',state.character==='boy');
  document.getElementById('boyActive').classList.toggle('hidden',state.character!=='boy');
  document.getElementById('girlNormal').classList.toggle('hidden',state.character==='girl');
  document.getElementById('girlActive').classList.toggle('hidden',state.character!=='girl');
  const check=document.getElementById('selectionCheck');
  check.style.left=state.character==='boy'?'430px':'856px';
  document.querySelectorAll('.color-state').forEach(el=>{
    const color=[...el.classList].find(c=>['blue','green','orange','red','yellow','purple'].includes(c));
    el.classList.toggle('hidden',el.classList.contains('press') ? color!==state.color : color===state.color);
  });
  document.querySelectorAll('.profile-char').forEach(el=>el.classList.add('hidden'));
  document.querySelector(`.profile-char[data-char="${state.character==='girl'?'G_2':'B_2'}"]`)?.classList.remove('hidden');
  const input=document.getElementById('nameInput');
  input.value=state.name;
  document.getElementById('placeholderName').classList.toggle('hidden',Boolean(state.name));
  document.getElementById('profileName').textContent=state.name || 'Игорь';
  redrawCharacters();
}
function save(){
  localStorage.setItem('fv_lang',state.lang);
  localStorage.setItem('fv_hide',String(state.hide));
  localStorage.setItem('fv_character',state.character);
  localStorage.setItem('fv_color',state.color);
  localStorage.setItem('fv_name',state.name);
}

window.addEventListener('resize',fit);
window.addEventListener('orientationchange',fit);
document.querySelectorAll('[data-lang]').forEach(btn=>btn.addEventListener('click',()=>{state.lang=btn.dataset.lang;save();sync()}));
document.getElementById('hideToggle').addEventListener('click',()=>{state.hide=!state.hide;save();sync()});
document.getElementById('continueBtn').addEventListener('pointerdown',()=>pressPair('startNormal','startPress'));
document.getElementById('continueBtn').addEventListener('click',()=>show('create'));
document.getElementById('boyPick').addEventListener('click',()=>{state.character='boy';save();sync()});
document.getElementById('girlPick').addEventListener('click',()=>{state.character='girl';save();sync()});
document.querySelectorAll('.colorPick').forEach(btn=>btn.addEventListener('click',()=>{state.color=btn.dataset.color;save();sync()}));
document.getElementById('nameInput').addEventListener('input',e=>{state.name=e.target.value.trim();save();sync()});
document.getElementById('nextBtn').addEventListener('pointerdown',()=>pressPair('createNormal','createPress'));
document.getElementById('nextBtn').addEventListener('click',()=>show('profile'));
document.getElementById('backBtn').addEventListener('click',()=>show('create'));
['boyNormal','boyActive','girlNormal','girlActive'].forEach(id=>setupRecolorNode(document.getElementById(id)));
document.querySelectorAll('.profile-char').forEach(setupRecolorNode);
fit();
sync();
const initialScreen=new URLSearchParams(location.search).get('screen');
if(initialScreen && screens[initialScreen])show(initialScreen);
</script>
</body>
</html>
