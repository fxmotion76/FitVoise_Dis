<script>
const screens={language:document.getElementById('screen-language'),create:document.getElementById('screen-create'),profile:document.getElementById('screen-profile')};
const state={lang:localStorage.getItem('fv_lang')||'ru',hide:localStorage.getItem('fv_hide')!=='false',character:localStorage.getItem('fv_character')||'boy',color:localStorage.getItem('fv_color')||'orange',name:localStorage.getItem('fv_name')||''};
function fit(){
  const vv=window.visualViewport;
  const vw=vv ? vv.width : document.documentElement.clientWidth;
  const vh=vv ? vv.height : document.documentElement.clientHeight;
  const ox=vv ? vv.offsetLeft : 0;
  const oy=vv ? vv.offsetTop : 0;
  const scale=Math.min(vw/1080,vh/1920);
  document.querySelectorAll('.fit').forEach(el=>{
    el.style.left=(ox+vw/2)+'px';
    el.style.top=(oy+vh/2)+'px';
    el.style.transform=`translate(-50%,-50%) scale(${scale})`;
  });
  document.documentElement.scrollTop=0;
  document.body.scrollTop=0;
}
function show(name){Object.entries(screens).forEach(([k,el])=>el.classList.toggle('active',k===name))}
function save(){localStorage.setItem('fv_lang',state.lang);localStorage.setItem('fv_hide',String(state.hide));localStorage.setItem('fv_character',state.character);localStorage.setItem('fv_color',state.color);localStorage.setItem('fv_name',state.name)}
function layer(screen,name){return [...document.querySelectorAll(`.layer[data-screen="${screen}"]`)].filter(el=>el.dataset.name===name)}
function setVisible(screen,name,visible){layer(screen,name).forEach(el=>el.classList.toggle('hidden',!visible))}
function flashLayer(screen,name,dur=150){setVisible(screen,name,true);clearTimeout(flashLayer.t);flashLayer.t=setTimeout(()=>setVisible(screen,name,false),dur)}
function sync(){
  const input=document.getElementById('nameInput'); if(input && input.value!==state.name) input.value=state.name;
  // Language screen states from Figma layers. Hidden exported states are toggled only when available.
  setVisible('language','Sligan_RUS 1',state.lang==='ru');
  setVisible('language','Sligan_Eng 1',state.lang==='en');
  setVisible('language','checkbox_on 1',state.hide); setVisible('language','checkbox_off 1',!state.hide);
  // Create screen keeps Figma initial render; interaction state is stored for the next profile/progression pass.
}
window.addEventListener('resize',fit);window.addEventListener('orientationchange',fit);
window.visualViewport?.addEventListener('resize',fit);
window.visualViewport?.addEventListener('scroll',fit);
document.querySelectorAll('[data-lang]').forEach(btn=>btn.addEventListener('click',()=>{state.lang=btn.dataset.lang;save();sync()}));
document.getElementById('hideToggle')?.addEventListener('click',()=>{state.hide=!state.hide;save();sync()});
document.getElementById('continueBtn')?.addEventListener('click',()=>show('create'));
document.getElementById('boyPick')?.addEventListener('click',()=>{state.character='boy';save();sync()});
document.getElementById('girlPick')?.addEventListener('click',()=>{state.character='girl';save();sync()});
document.querySelectorAll('.colorPick').forEach(btn=>btn.addEventListener('click',()=>{state.color=btn.dataset.color;save();sync()}));
document.getElementById('nameInput')?.addEventListener('input',e=>{state.name=e.target.value.trim();save();sync()});
document.getElementById('nextBtn')?.addEventListener('click',()=>show('profile'));
document.getElementById('backBtn')?.addEventListener('click',()=>show('create'));
fit();requestAnimationFrame(fit);setTimeout(fit,120);sync();const initial=new URLSearchParams(location.search).get('screen');if(initial&&screens[initial])show(initial);
</script>
