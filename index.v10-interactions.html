let canvasTintAvailable=true;
if(new URLSearchParams(location.search).get('noCanvas')==='1')canvasTintAvailable=false;
function loadImage(src,onload=redrawCreateChars){const img=new Image();img.src=src;img.onload=onload;return img}
function isOrange(r,g,b,a){if(a<40)return false;const max=Math.max(r,g,b),min=Math.min(r,g,b);return r>165&&g>55&&g<185&&b<115&&r>g+18&&g>b+8&&(max-min)>58}
function shade(target,r,g,b){const lum=.2126*r+.7152*g+.0722*b;const f=Math.max(.52,Math.min(1.30,lum/145));return [Math.max(0,Math.min(255,Math.round(target[0]*f))),Math.max(0,Math.min(255,Math.round(target[1]*f))),Math.max(0,Math.min(255,Math.round(target[2]*f)))]}
function drawTinted(canvas,img,w=569,h=569){
  if(!canvas||!img.complete||!img.naturalWidth)return null;
  try{
    const ctx=canvas.getContext('2d',{willReadFrequently:true});
    canvas.width=w;canvas.height=h;ctx.clearRect(0,0,w,h);ctx.drawImage(img,0,0,w,h);
    const data=ctx.getImageData(0,0,w,h),p=data.data,target=colors[state.color]||colors.orange;
    for(let i=0;i<p.length;i+=4){if(isOrange(p[i],p[i+1],p[i+2],p[i+3])){const s=shade(target,p[i],p[i+1],p[i+2]);p[i]=s[0];p[i+1]=s[1];p[i+2]=s[2]}}
    ctx.putImageData(data,0,0);
    return true;
  }catch(e){
    canvasTintAvailable=false;
    canvas.classList.add('hidden');
    return false;
  }
}
function setCreateCanvas(name,visible){const el=document.querySelector(`[data-create-char="${name}"]`);if(el)el.classList.toggle('hidden',!visible)}
function setCreateOriginals(){
  setId(ids.create.boyActive,!canvasTintAvailable&&state.character==='boy');
  setId(ids.create.boyNormal,!canvasTintAvailable&&state.character!=='boy');
  setId(ids.create.girlActive,!canvasTintAvailable&&state.character==='girl');
  setId(ids.create.girlNormal,!canvasTintAvailable&&state.character!=='girl');
}
function redrawCreateChars(){
  if(!canvasTintAvailable)return false;
  let ok=true;
  Object.entries(createCharImages).forEach(([name,img])=>{if(drawTinted(document.querySelector(`[data-create-char="${name}"]`),img)===false)ok=false});
  if(!ok){canvasTintAvailable=false;document.querySelectorAll('[data-create-char]').forEach(el=>el.classList.add('hidden'));setCreateOriginals()}
  return ok;
}
function setCatLikeFrame(frame){
  const catReady=createCatImages[1]?.complete&&createCatImages[1]?.naturalWidth&&createCatImages[2]?.complete&&createCatImages[2]?.naturalWidth;
  if(canvasTintAvailable&&catReady){
    setId(ids.create.catLike1,false);
    setId(ids.create.catLike2,false);
    document.querySelector('[data-cat-like="1"]')?.classList.toggle('hidden',frame!==1);
    document.querySelector('[data-cat-like="2"]')?.classList.toggle('hidden',frame!==2);
  }else{
    document.querySelectorAll('[data-cat-like]').forEach(el=>el.classList.add('hidden'));
    setId(ids.create.catLike1,frame===1);
    setId(ids.create.catLike2,frame===2);
  }
}
function redrawCreateCat(){
  if(!canvasTintAvailable)return false;
  let ok=true;
  Object.entries(createCatImages).forEach(([frame,img])=>{if(drawTinted(document.querySelector(`[data-cat-like="${frame}"]`),img,333,235)===false)ok=false});
  if(!ok){canvasTintAvailable=false;document.querySelectorAll('[data-cat-like]').forEach(el=>el.classList.add('hidden'))}
  else setCatLikeFrame(1);
  return ok;
}
function pulseCatLike(){
  setCatLikeFrame(2);
  clearTimeout(pulseCatLike.t);
  pulseCatLike.t=setTimeout(()=>setCatLikeFrame(1),220);
}
function drawProfileChar(){
  const stage=Math.max(1,Math.min(9,state.stage||1));
  const item=profileStageData[state.character==='girl'?'girl':'boy'][stage];
  const canvas=document.getElementById('profileCharCanvas');
  if(!canvas||!item||!canvasTintAvailable)return false;
  canvas.style.left=item.x+'%';canvas.style.top=item.y+'%';canvas.style.width=item.w+'%';canvas.style.height=item.h+'%';
  return drawTinted(canvas,profileCharImages[item.src],item.px,item.py);
}
function fit(){document.documentElement.scrollTop=0;document.body.scrollTop=0;}
function show(name){Object.entries(screens).forEach(([k,el])=>el.classList.toggle('active',k===name))}
function save(){localStorage.setItem('fv_lang',state.lang);localStorage.setItem('fv_hide',String(state.hide));localStorage.setItem('fv_character',state.character);localStorage.setItem('fv_color',state.color);localStorage.setItem('fv_name',state.name);localStorage.setItem('fv_stage',String(state.stage))}
function byId(id){return document.querySelector(`.layer[data-id="${id}"]`)}
function setId(id,visible){const el=byId(id);if(el)el.classList.toggle('hidden',!visible)}
function setIds(list,visible){list.forEach(id=>setId(id,visible))}
function setClock(mode){
  setId(ids.language.clockNormal,mode==='normal');
  setId(ids.language.clockBlink,mode==='blink');
  setId(ids.language.clockPress,mode==='press');
}
function blinkClock(){
  if(!screens.language.classList.contains('active'))return;
  setClock('blink');
  clearTimeout(blinkClock.off);
  blinkClock.off=setTimeout(()=>setClock('normal'),160);
}
function startClockBlink(){
  clearTimeout(startClockBlink.t);
  startClockBlink.t=setTimeout(()=>{blinkClock();startClockBlink()},2800+Math.random()*2500);
}
function pressClock(){
  clearTimeout(blinkClock.off);
  clearTimeout(pressClock.t);
  setClock('press');
  pressClock.t=setTimeout(()=>setClock('normal'),260);
}
function pulse({press,normal,text,speed=[]},dur=140){
  if(normal)setId(normal,false);
  if(press)setId(press,true);
  if(text)byId(text)?.classList.add('nudge');
  if(text && typeof text==='string' && text.startsWith('#'))document.querySelector(text)?.classList.add('nudge');
  setIds(speed,true);
  clearTimeout(pulse.t);
  pulse.t=setTimeout(()=>{
    if(press)setId(press,false);
    if(normal)setId(normal,true);
    if(text)byId(text)?.classList.remove('nudge');
    if(text && typeof text==='string' && text.startsWith('#'))document.querySelector(text)?.classList.remove('nudge');
    setIds(speed,false);
  },dur);
}
function sync(){
  const input=document.getElementById('nameInput'); if(input && input.value!==state.name) input.value=state.name;
  setId(ids.language.buttonPress,false);
  setId(ids.language.buttonNormal,true);
  setId(ids.language.ruPress,state.lang==='ru');
  setId(ids.language.ruNormal,state.lang!=='ru');
  setId(ids.language.enPress,state.lang==='en');
  setId(ids.language.enNormal,state.lang!=='en');
  byId(ids.language.ruText)?.classList.toggle('inactive',state.lang!=='ru');
  byId(ids.language.enText)?.classList.toggle('inactive',state.lang!=='en');
  setClock('normal');
  const l=labels[state.lang]||labels.ru;
  const english=state.lang==='en';
  setId(ids.language.buttonText,!english);
  setId('3:53',!english);
  setId('4:71',!english);
  document.getElementById('languageButtonText').textContent=l.continue;
  document.getElementById('languageHintText').textContent=l.later;
  document.getElementById('hideText').textContent=l.hide;
  document.getElementById('languageButtonText').classList.toggle('hidden',!english);
  document.getElementById('languageButtonText').classList.toggle('en',english);
  document.getElementById('languageHintText').classList.toggle('hidden',!english);
  document.getElementById('hideText').classList.toggle('hidden',!english);
  setId(ids.language.checkboxOn,state.hide);
  setId(ids.language.checkboxOff,!state.hide);
  setId(ids.language.sloganRu,state.lang==='ru');
  setId(ids.language.sloganEn,state.lang==='en');
  setIds(ids.language.speed,false);
  document.getElementById('createButtonText').textContent=l.continue;
  document.getElementById('createButtonText').classList.toggle('en',english);
  document.getElementById('profileButtonText').textContent=l.start;
  document.getElementById('profileButtonText').classList.toggle('en',english);

  setId(ids.create.buttonPress,false);
  setId(ids.create.buttonNormal,true);
  if(canvasTintAvailable){
    setId(ids.create.boyActive,false);
    setId(ids.create.boyNormal,false);
    setId(ids.create.girlActive,false);
    setId(ids.create.girlNormal,false);
    setCreateCanvas('boyActive',state.character==='boy');
    setCreateCanvas('boyNormal',state.character!=='boy');
    setCreateCanvas('girlActive',state.character==='girl');
    setCreateCanvas('girlNormal',state.character!=='girl');
  }else{
    document.querySelectorAll('[data-create-char]').forEach(el=>el.classList.add('hidden'));
    setCreateOriginals();
  }
  setId(ids.create.arrowBoy,state.character==='boy');
  setId(ids.create.arrowGirl,state.character==='girl');
  setId(ids.create.titleRu,false);
  setId(ids.create.titleEn,false);
  const createTitle=document.getElementById('createTitleText');
  createTitle.textContent=english?'WHO IS TRAINING?':'КТО ТРЕНИРУЕТСЯ?';
  createTitle.classList.toggle('en',english);
  setId('7:94',!state.name);
  setId('9:141',!english);
  document.getElementById('createHintText').textContent=l.later;
  document.getElementById('createHintText').classList.toggle('hidden',!english);
  setIds(ids.create.speed,false);
  Object.entries(ids.create.color).forEach(([color,pair])=>{
    setId(pair.press,state.color===color);
    setId(pair.normal,state.color!==color);
  });
  redrawCreateChars();
  redrawCreateCat();
  setCatLikeFrame(1);

  setId(ids.profile.buttonPress,false);
  setId(ids.profile.buttonNormal,true);
  setIds(ids.profile.speed,false);
  setId('6:84',false);
  document.getElementById('profileNameText').textContent=state.name||'\u0418\u0433\u043e\u0440\u044c';
  Object.values(ids.profile.boy).forEach(id=>setId(id,false));
  Object.values(ids.profile.girl).forEach(id=>setId(id,false));
  Object.values(ids.profile.cat).forEach(id=>setId(id,false));
  ['48:16','54:29','54:30'].forEach(id=>setId(id,false));
  const stage=Math.max(1,Math.min(9,state.stage||1));
  const bannerStage=stage===1?1:(stage===2?2:3);
  const banner=profileBannerStages[bannerStage];
  setId(banner.banner,true);
  const nameEl=document.getElementById('profileNameText');
  if(nameEl){Object.assign(nameEl.style,banner.name);}
  const profileCanvas=document.getElementById('profileCharCanvas');
  if(profileCanvas)profileCanvas.classList.toggle('hidden',!canvasTintAvailable);
  const profileOk=drawProfileChar();
  if(!profileOk){
    const chain=state.character==='girl'?ids.profile.girl:ids.profile.boy;
    setId(chain[stage],true);
  }
  setId(ids.profile.cat[stage],true);
}
