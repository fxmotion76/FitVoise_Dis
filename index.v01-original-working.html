const CREATE_HTML = "\n<main class=\"app\" id=\"app\">\n  <img class=\"banner\" src=\"assets/panels/Verh_Banner.png\" alt=\"\">\n\n  <div class=\"section s1\">1. \u0412\u042b\u0411\u0415\u0420\u0418 \u041f\u0415\u0420\u0421\u041e\u041d\u0410\u0416\u0410</div>\n\n  <button class=\"card selected\" id=\"boyCard\" type=\"button\" aria-label=\"\u0412\u044b\u0431\u0440\u0430\u0442\u044c \u043c\u0430\u043b\u044c\u0447\u0438\u043a\u0430\">\n    <canvas class=\"charCanvas\" id=\"boyCanvas\"></canvas>\n    <span class=\"check\">\u2713</span>\n  </button>\n\n  <button class=\"card\" id=\"girlCard\" type=\"button\" aria-label=\"\u0412\u044b\u0431\u0440\u0430\u0442\u044c \u0434\u0435\u0432\u043e\u0447\u043a\u0443\">\n    <canvas class=\"charCanvas\" id=\"girlCanvas\"></canvas>\n    <span class=\"check\">\u2713</span>\n  </button>\n\n  <div class=\"section s2\">2. \u0418\u041c\u042f \u041f\u0415\u0420\u0421\u041e\u041d\u0410\u0416\u0410</div>\n  <label class=\"nameWrap\">\n    <img class=\"nameBg\" src=\"assets/inputs/input_name.png\" alt=\"\">\n    <input id=\"nameInput\" maxlength=\"18\" autocomplete=\"off\" placeholder=\"\u0412\u0432\u0435\u0434\u0438\u0442\u0435 \u0438\u043c\u044f...\">\n    <img class=\"pencil\" src=\"assets/icons/Pencel.png\" alt=\"\">\n  </label>\n\n  <div class=\"section s3\">3. \u0412\u042b\u0411\u0415\u0420\u0418 \u0426\u0412\u0415\u0422 \u041e\u0414\u0415\u0416\u0414\u042b</div>\n  <div class=\"colors\">\n    <button class=\"colorBtn\" data-color=\"red\" data-hex=\"#e74c3c\" type=\"button\"></button>\n    <button class=\"colorBtn selected\" data-color=\"orange\" data-hex=\"#f28c18\" type=\"button\"></button>\n    <button class=\"colorBtn\" data-color=\"yellow\" data-hex=\"#f1c40f\" type=\"button\"></button>\n    <button class=\"colorBtn\" data-color=\"green\" data-hex=\"#6ac943\" type=\"button\"></button>\n    <button class=\"colorBtn\" data-color=\"blue\" data-hex=\"#2497d8\" type=\"button\"></button>\n    <button class=\"colorBtn\" data-color=\"purple\" data-hex=\"#8e44ad\" type=\"button\"></button>\n  </div>\n\n  <button class=\"next\" id=\"nextBtn\" type=\"button\">\u0414\u0410\u041b\u0415\u0415</button>\n  <div class=\"toast\" id=\"toast\">\u041f\u0435\u0440\u0441\u043e\u043d\u0430\u0436 \u0441\u043e\u0445\u0440\u0430\u043d\u0451\u043d</div>\n</main>\n\n";

const startScreen=document.getElementById('startScreen');
const createScreen=document.getElementById('createScreen');
const profileScreen=document.getElementById('profileScreen');
const profileName=document.getElementById('profileName');

function showScreen(name){
  startScreen.classList.toggle('active', name==='start');
  createScreen.classList.toggle('active', name==='create');
  profileScreen.classList.toggle('active', name==='profile');
}
function fitAll(){
  const vw=window.innerWidth, vh=window.innerHeight;
  const scale=Math.min(vw/864, vh/1536);
  document.querySelectorAll('.fit-wrap').forEach(el=>{
    el.style.transform=`translate(-50%,-50%) scale(${scale})`;
  });
}
window.addEventListener('resize',fitAll);
window.addEventListener('orientationchange',fitAll);
fitAll();

function mountShadow(id, css, html){
  const host=document.getElementById(id);
  const root=host.attachShadow({mode:'open'});
  root.innerHTML='<style>'+css+'</style>'+html;
  return root;
}
const startRoot=mountShadow('startMount', START_CSS, START_HTML);
const createRoot=mountShadow('createMount', CREATE_CSS, CREATE_HTML);

function initStart(root){
  const STRINGS={ru:{title:'ВЫБОР<br>ЯЗЫКА',ru:'РУССКИЙ',en:'ENGLISH',hint:'Можно изменить позже',dontShow:'Не показывать больше',cont:'ПРОДОЛЖИТЬ'},en:{title:'SELECT<br>LANGUAGE',ru:'RUSSIAN',en:'ENGLISH',hint:'Can be changed later',dontShow:'Don’t show again',cont:'CONTINUE'}};
  const $=s=>root.querySelector(s);
  const viewport=$('.viewport'), stage=$('#stage');
  function fitStage(){viewport.style.width='864px';viewport.style.height='1536px';stage.style.transform='translate(0px,0px) scale(1)';}
  fitStage();
  const ruCard=$('#ruCard'), enCard=$('#enCard'), titleText=$('#titleText'), ruLabel=$('#ruLabel'), enLabel=$('#enLabel'), hintWrap=$('#hintWrap'), hintBg=hintWrap.querySelector('.hintBg'), hintText=$('#hintText'), checkboxText=$('#checkboxText'), continueText=$('#continueText'), checkboxToggle=$('#checkboxToggle'), checkboxImg=$('#checkboxImg'), stopwatchWrap=$('#stopwatchWrap'), continueBtn=$('#continueBtn');
  let currentLang=localStorage.getItem('ST_language')||'ru';
  let dontShow=localStorage.getItem('ST_hide_language_screen'); dontShow=dontShow===null?true:dontShow==='true';
  function flash(el,dur=160){el.classList.add('show');clearTimeout(el._timer);el._timer=setTimeout(()=>el.classList.remove('show'),dur)}
  function pulseStopwatch(){stopwatchWrap.classList.remove('pulse');void stopwatchWrap.offsetWidth;stopwatchWrap.classList.add('pulse');clearTimeout(stopwatchWrap._timer);stopwatchWrap._timer=setTimeout(()=>stopwatchWrap.classList.remove('pulse'),240)}
  function setCardState(card,active){const normal=card.querySelector('.frameNormal');const activeImg=card.querySelector('.frameActive');card.classList.toggle('active',active);normal.style.opacity=active?'0':'1';activeImg.style.opacity=active?'1':'0'}
  function resizeHint(){requestAnimationFrame(()=>{const sidePadding=44, bulbWidth=74, gap=20; const textWidth=Math.ceil(hintText.scrollWidth||hintText.getBoundingClientRect().width||0); const total=Math.ceil(sidePadding+bulbWidth+gap+textWidth+sidePadding); hintWrap.style.width=total+'px';hintWrap.style.setProperty('--hintWidth',total+'px');if(hintBg)hintBg.style.width=total+'px';})}
  function applyLang(lang,withFx=false){currentLang=lang;localStorage.setItem('ST_language',currentLang);const s=STRINGS[currentLang];document.documentElement.lang=currentLang;titleText.innerHTML=s.title;titleText.classList.toggle('en',currentLang==='en');ruLabel.textContent=s.ru;enLabel.textContent=s.en;hintText.textContent=s.hint;resizeHint();checkboxText.textContent=s.dontShow;checkboxToggle.setAttribute('aria-label',s.dontShow);continueText.textContent=s.cont;setCardState(ruCard,currentLang==='ru');setCardState(enCard,currentLang==='en');if(withFx){flash(root.getElementById(currentLang==='ru'?'speedRu':'speedEn'),150);pulseStopwatch();}}
  function applyCheckbox(){localStorage.setItem('ST_hide_language_screen',String(dontShow));checkboxImg.src=dontShow?'assets/icons/checkbox_on.png':'assets/icons/checkbox_off.png';}
  ruCard.addEventListener('click',()=>applyLang('ru',true));enCard.addEventListener('click',()=>applyLang('en',true));checkboxToggle.addEventListener('click',()=>{dontShow=!dontShow;applyCheckbox();});
  function pulseButton(){continueBtn.classList.add('pulse');flash(root.getElementById('speedButton'),110);clearTimeout(continueBtn._timer);continueBtn._timer=setTimeout(()=>continueBtn.classList.remove('pulse'),120)}
  continueBtn.addEventListener('pointerdown',pulseButton);continueBtn.addEventListener('click',()=>showScreen('create'));
  applyLang(currentLang,false);resizeHint();applyCheckbox();
}

function initCreate(root){
  root.host.style.setProperty('--accent-color','#f28c18');
  const state={character:'boy',color:'orange',name:''};
  const COLORS={red:[231,76,60],orange:[242,140,24],yellow:[241,196,15],green:[106,201,67],blue:[36,151,216],purple:[142,68,173]};
  const $=s=>root.querySelector(s);
  const images={boyNormal:new Image(),boySelected:new Image(),girlNormal:new Image(),girlSelected:new Image()};
  images.boyNormal.src='assets/characters/B_4.png';images.boySelected.src='assets/characters/B_8_Start.png';images.girlNormal.src='assets/characters/G_4.png';images.girlSelected.src='assets/characters/G_8.png';
  const alphaCache=new WeakMap();
  function getAlphaBox(img){if(alphaCache.has(img))return alphaCache.get(img);const temp=document.createElement('canvas');const tctx=temp.getContext('2d',{willReadFrequently:true});temp.width=img.naturalWidth;temp.height=img.naturalHeight;tctx.clearRect(0,0,temp.width,temp.height);tctx.drawImage(img,0,0);const data=tctx.getImageData(0,0,temp.width,temp.height).data;let minX=temp.width,minY=temp.height,maxX=0,maxY=0,found=false;for(let y=0;y<temp.height;y++){for(let x=0;x<temp.width;x++){const a=data[(y*temp.width+x)*4+3];if(a>20){if(x<minX)minX=x;if(y<minY)minY=y;if(x>maxX)maxX=x;if(y>maxY)maxY=y;found=true;}}}const box=found?{x:minX,y:minY,w:maxX-minX+1,h:maxY-minY+1}:{x:0,y:0,w:img.naturalWidth,h:img.naturalHeight};alphaCache.set(img,box);return box;}
  function isOrange(r,g,b,a){if(a<40)return false;const max=Math.max(r,g,b),min=Math.min(r,g,b);return r>165&&g>55&&g<185&&b<115&&r>g+18&&g>b+8&&(max-min)>58;}
  function shade(target,r,g,b){const lum=.2126*r+.7152*g+.0722*b;let f=Math.max(.52,Math.min(1.30,lum/145));return [Math.max(0,Math.min(255,Math.round(target[0]*f))),Math.max(0,Math.min(255,Math.round(target[1]*f))),Math.max(0,Math.min(255,Math.round(target[2]*f)))];}
  function drawCanvas(canvas,img,kind){if(!img.complete||!img.naturalWidth)return;const ctx=canvas.getContext('2d',{willReadFrequently:true});const slotW=420,slotH=420;canvas.width=slotW;canvas.height=slotH;ctx.clearRect(0,0,slotW,slotH);const box=getAlphaBox(img);let targetW=330,targetH=365,compensate=1;if(kind==='boy'&&img===images.boySelected)compensate=1.18;if(kind==='girl'&&img===images.girlSelected)compensate=1.18;let scale=Math.min(targetW/box.w,targetH/box.h)*compensate;const maxScale=Math.min((slotW-20)/box.w,(slotH-20)/box.h);scale=Math.min(scale,maxScale);const drawW=box.w*scale,drawH=box.h*scale,dx=(slotW-drawW)/2,dy=slotH-drawH-18;ctx.drawImage(img,box.x,box.y,box.w,box.h,dx,dy,drawW,drawH);const data=ctx.getImageData(0,0,canvas.width,canvas.height);const p=data.data,target=COLORS[state.color];for(let i=0;i<p.length;i+=4){if(isOrange(p[i],p[i+1],p[i+2],p[i+3])){const s=shade(target,p[i],p[i+1],p[i+2]);p[i]=s[0];p[i+1]=s[1];p[i+2]=s[2];}}ctx.putImageData(data,0,0);}
  function redrawChars(){const boyImg=state.character==='boy'?images.boySelected:images.boyNormal;const girlImg=state.character==='girl'?images.girlSelected:images.girlNormal;drawCanvas($('#boyCanvas'),boyImg,'boy');drawCanvas($('#girlCanvas'),girlImg,'girl');}
  function save(){state.name=$('#nameInput').value.trim();localStorage.setItem('scr_character',JSON.stringify(state));}
  function chooseCharacter(ch){state.character=ch;$('#boyCard').classList.toggle('selected',ch==='boy');$('#girlCard').classList.toggle('selected',ch==='girl');redrawChars();save();}
  function chooseColor(btn){root.querySelectorAll('.colorBtn').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');state.color=btn.dataset.color;root.host.style.setProperty('--accent-color',btn.dataset.hex||'#f28c18');redrawChars();save();}
  $('#boyCard').onclick=()=>chooseCharacter('boy');$('#girlCard').onclick=()=>chooseCharacter('girl');root.querySelectorAll('.colorBtn').forEach(btn=>btn.onclick=()=>chooseColor(btn));$('#nameInput').addEventListener('input',save);
  $('#nextBtn').onclick=()=>{$('#nextBtn').classList.add('pressed');clearTimeout(window.nextPressTimer);window.nextPressTimer=setTimeout(()=>$('#nextBtn').classList.remove('pressed'),160);save();const t=$('#toast');t.classList.add('show');clearTimeout(window.toastTimer);window.toastTimer=setTimeout(()=>t.classList.remove('show'),900);profileName.textContent=state.name||'Персонаж';try{localStorage.setItem('scr_profile',JSON.stringify(state));}catch(e){}showScreen('profile');};
  Object.values(images).forEach(img=>img.onload=redrawChars);
  try{const saved=JSON.parse(localStorage.getItem('scr_character')||'{}');if(saved.name)$('#nameInput').value=saved.name;if(saved.color&&COLORS[saved.color]){const b=root.querySelector('.colorBtn[data-color="'+saved.color+'"]');if(b)chooseColor(b);}if(saved.character==='girl')chooseCharacter('girl');}catch(e){}
  redrawChars();
}
initStart(startRoot);
initCreate(createRoot);
</script>
